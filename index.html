<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pi Dashboard</title>
<link rel="icon" href="data:,">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { height:100%; width:100%; overflow:hidden; }
  body {
    color:#fff;
    font-family: system-ui,"Segoe UI",Roboto,sans-serif;
    background: url('wallpaper.jpg') center center / cover no-repeat fixed;
  }
  .widget {
    background:rgba(15,18,32,0.34);
    backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,0.14);
    border-radius:16px; padding:12px 16px;
    box-shadow:0 6px 24px rgba(0,0,0,0.35);
    text-shadow:0 1px 3px rgba(0,0,0,0.5);
  }
  .hint { font-size:.65rem; opacity:.5; text-transform:none; letter-spacing:0; }
  h2 { font-size:.7rem; text-transform:uppercase; letter-spacing:1px; opacity:.7; margin-bottom:4px; }

  #leftCol {
    z-index:20;
    position:fixed; left:16px; top:16px; bottom:16px; width:236px;
    display:flex; flex-direction:column; justify-content:space-between; gap:10px;
  }
  #clockWidget #clock { font-size:2.6rem; font-weight:600; line-height:1; white-space:nowrap; }
  #clockWidget #clock .sec { font-size:1.2rem; opacity:.7; }
  #clockWidget #clock .ampm { font-size:1rem; opacity:.8; margin-left:4px; }
  #clockWidget #date { font-size:.9rem; opacity:.85; margin-top:2px; }
  #clockWidget #greeting { font-size:.78rem; opacity:.7; margin-top:1px; }

  #weatherCard { cursor:pointer; position:relative; }
  #weatherNow { font-size:1.7rem; }
  #weatherNow .cond { display:block; font-size:.9rem; opacity:.85; margin-top:2px; }
  #forecast {
    display:none; position:absolute; left:100%; top:0; margin-left:8px; width:176px;
    background:rgba(12,15,28,0.72); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
    border:1px solid rgba(255,255,255,0.14); border-radius:14px; padding:10px; gap:6px; z-index:10;
    box-shadow:0 8px 26px rgba(0,0,0,0.45);
  }
  #forecast.open { display:flex; }
  .day { flex:1; text-align:center; background:rgba(255,255,255,0.08); border-radius:10px; padding:7px 2px; font-size:.7rem; }
  .day .d { opacity:.75; font-size:.66rem; margin-bottom:3px; }

  #sysCard { position:relative; padding:10px 14px; }
  #sysCard .row { display:flex; justify-content:space-between; font-size:.78rem; margin-top:3px; }
  #sysCard .row:first-of-type { margin-top:0; }
  #sysCard .bar { height:4px; background:rgba(255,255,255,0.12); border-radius:4px; margin-top:2px; overflow:hidden; }
  #sysCard .bar i { display:block; height:100%; width:0; background:#5b8cff; border-radius:4px; transition:width .5s, background .5s; }

  #speedPop {
    display:none; position:absolute; left:100%; bottom:48px; margin-left:8px; width:176px;
    background:rgba(12,15,28,0.72); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
    border:1px solid rgba(255,255,255,0.14); border-radius:14px; padding:10px; z-index:10;
    box-shadow:0 8px 26px rgba(0,0,0,0.45);
  }
  #speedPop.open { display:block; }
  #speedPop .t { font-size:.66rem; opacity:.7; margin-bottom:4px; }
  #netRow { cursor:pointer; }
  #newsCard { position:fixed; right:16px; top:16px; bottom:16px; width:340px; display:flex; flex-direction:column; }
  #briefList { list-style:none; flex:1; overflow-y:auto; margin-top:4px; }
  #briefList li { font-size:.84rem; line-height:1.4; padding:5px 0 5px 15px; position:relative; opacity:.95;
    border-bottom:1px solid rgba(255,255,255,0.08); }
  #briefList li:last-child { border-bottom:none; }
  #briefList li::before { content:'▪'; position:absolute; left:2px; color:#9db8ff; }

  #remCard {
    position:fixed; left:262px; right:372px; top:16px; bottom:64px;
    display:flex; flex-direction:column;
  }
  #remList { list-style:none; flex:1; overflow-y:auto; margin-top:2px; }
  #remList li { display:flex; align-items:flex-start; gap:8px; padding:6px 2px;
    border-bottom:1px solid rgba(255,255,255,0.1); font-size:.85rem; cursor:pointer; }
  #remList li:last-child { border-bottom:none; }
  #remList .txt { flex:1; min-width:0; word-break:break-word; overflow-wrap:anywhere; }
  #remList li.done .txt { text-decoration:line-through; opacity:.5; }
  #remList .del { opacity:.5; padding:0 4px; flex:none; }
  #remForm { display:flex; gap:6px; margin-top:8px; }
  #remInput { flex:1; min-width:0; background:rgba(255,255,255,0.1);
    border:1px solid rgba(255,255,255,0.2); border-radius:10px; color:#fff;
    padding:8px 10px; font-size:.85rem; outline:none; }
  #remInput::placeholder { color:rgba(255,255,255,0.45); }
  #remAdd { background:rgba(91,140,255,0.45); border:1px solid rgba(91,140,255,0.5);
    border-radius:10px; color:#fff; padding:8px 14px; font-size:1rem; cursor:pointer; }

  #btnRow {
    position:fixed; left:262px; right:372px; bottom:16px;
    display:flex; justify-content:center; gap:10px; z-index:5;
  }
  #powerBtn {
    display:inline-flex; align-items:center; gap:6px;
    background:rgba(15,18,32,0.34); color:#fff;
    backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,0.14); border-radius:20px;
    padding:8px 16px; font-size:.9rem; cursor:pointer;
    text-shadow:0 1px 3px rgba(0,0,0,0.5); box-shadow:0 6px 24px rgba(0,0,0,0.35);
    transition: background .3s ease, border-color .3s ease, transform .12s ease;
  }
  #powerBtn:active { transform:scale(0.93); }
  #powerBtn.confirm { background:rgba(255,80,80,0.4); border-color:rgba(255,120,120,0.6);
    box-shadow:0 0 18px rgba(255,90,90,0.35); }

  #dimBtn {
    display:inline-flex; align-items:center; gap:6px;
    background:rgba(15,18,32,0.34); color:#fff;
    backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,0.14); border-radius:20px;
    padding:8px 18px; font-size:.9rem; cursor:pointer;
    text-shadow:0 1px 3px rgba(0,0,0,0.5); box-shadow:0 6px 24px rgba(0,0,0,0.35);
    transition: background .3s ease, border-color .3s ease, transform .12s ease, box-shadow .3s ease;
  }
  #dimBtn:hover { background:rgba(35,42,74,0.5); }
  #dimBtn:active { transform:scale(0.93); }
  #dimBtn.on { background:rgba(70,55,20,0.45); border-color:rgba(255,200,120,0.4); box-shadow:0 0 18px rgba(255,180,80,0.25); }
  #dimIcon { display:inline-flex; }
  #dimBtn.spin #dimIcon { animation: dimpop .5s ease; }
  @keyframes dimpop {
    0%   { transform: rotate(0deg)   scale(1); }
    50%  { transform: rotate(180deg) scale(1.35); }
    100% { transform: rotate(360deg) scale(1); }
  }
</style>
</head>
<body>
  <div id="leftCol">
    <div class="widget" id="clockWidget">
      <div id="clock">--:--</div>
      <div id="date">—</div>
      <div id="greeting">Hello</div>
    </div>
    <div class="widget" id="weatherCard">
      <h2>Weather <span class="hint">· tap for forecast</span></h2>
      <div id="weatherNow">Loading…</div>
      <div id="forecast"></div>
    </div>
    <div class="widget" id="sysCard">
      <h2>System</h2>
      <div class="row"><span>CPU</span><span id="cpuPct">—</span></div>
      <div class="bar"><i id="cpuBar"></i></div>
      <div class="row"><span>Temp · Fan</span><span><span id="cpuTemp">—</span> · <span id="fanRpm">—</span></span></div>
      <div class="row"><span>RAM</span><span id="memPct">—</span></div>
      <div class="bar"><i id="memBar"></i></div>
      <div class="row"><span>Disk</span><span id="diskPct">—</span></div>
      <div class="bar"><i id="diskBar"></i></div>
      <div class="row" id="netRow"><span>Net <span class="hint">· tap</span></span><span id="netNow">—</span></div>
      <div id="speedPop">
        <div class="t">Download Mbps (blue) / Upload (green) — hourly</div>
        <canvas id="speedChart" width="156" height="64"></canvas>
        <div class="t" id="speedLatest" style="margin-top:4px"></div>
      </div>
    </div>
  </div>

  <div class="widget" id="remCard">
    <h2>Reminders <span class="hint">· tap to check off</span></h2>
    <ul id="remList"></ul>
    <form id="remForm">
      <input id="remInput" type="text" placeholder="Add a reminder…" autocomplete="off">
      <button id="remAdd" type="submit">+</button>
    </form>
  </div>

  <div class="widget" id="newsCard">
    <h2>Daily Brief <span class="hint" id="briefTime">· waiting for first brief</span></h2>
    <ul id="briefList"><li style="border:none">Loading…</li></ul>
  </div>

  <div id="btnRow">
  <button id="powerBtn"><span id="pwIcon"></span><span id="pwLabel">Off</span></button>
  <button id="dimBtn"><span id="dimIcon"></span><span id="dimLabel">Dim</span></button>
  </div>

<script>
  const LAT = 12.975841;
  const LON = 79.158979;
  const UNITS = 'celsius';
  const SYM = UNITS === 'celsius' ? '°C' : '°F';

  function tick(){
    const now = new Date();
    const h = now.getHours();
    const m = String(now.getMinutes()).padStart(2,'0');
    const s = String(now.getSeconds()).padStart(2,'0');
    const ampm = h < 12 ? 'AM' : 'PM';
    const hr12 = (h % 12) || 12;
    document.getElementById('clock').innerHTML =
      `${hr12}:${m}<span class="sec">:${s}</span> <span class="ampm">${ampm}</span>`;
    document.getElementById('date').textContent =
      now.toLocaleDateString(undefined,{weekday:'long',month:'long',day:'numeric'});
    document.getElementById('greeting').textContent =
      h<12 ? 'Good morning' : h<18 ? 'Good afternoon' : 'Good evening';
  }
  setInterval(tick,1000); tick();

  function wIcon(c){
    if(c===0) return '☀️';
    if(c===1) return '🌤️';
    if(c===2) return '⛅';
    if(c===3) return '☁️';
    if(c===45||c===48) return '🌫️';
    if(c>=51&&c<=57) return '🌦️';
    if(c>=61&&c<=67) return '🌧️';
    if(c>=71&&c<=77) return '🌨️';
    if(c>=80&&c<=82) return '🌦️';
    if(c===85||c===86) return '🌨️';
    if(c>=95) return '⛈️';
    return '🌡️';
  }
  function wText(c){
    const m={0:'Clear',1:'Mostly clear',2:'Partly cloudy',3:'Overcast',45:'Fog',48:'Fog',
      51:'Drizzle',53:'Drizzle',55:'Drizzle',56:'Freezing drizzle',57:'Freezing drizzle',
      61:'Rain',63:'Rain',65:'Heavy rain',66:'Freezing rain',67:'Freezing rain',
      71:'Snow',73:'Snow',75:'Heavy snow',77:'Snow grains',80:'Showers',81:'Showers',82:'Heavy showers',
      85:'Snow showers',86:'Snow showers',95:'Thunderstorm',96:'Thunderstorm',99:'Thunderstorm'};
    return m[c]||'';
  }
  let weatherShown = false;
  function renderWeather(d){
    const t = Math.round(d.current.temperature_2m);
    const c = d.current.weather_code;
    document.getElementById('weatherNow').innerHTML =
      `${t}${SYM} <span class="cond">${wText(c)} ${wIcon(c)}</span>`;
    const fc = document.getElementById('forecast'); fc.innerHTML = '';
    for(let i=1;i<d.daily.time.length;i++){
      const day = new Date(d.daily.time[i]+'T00:00').toLocaleDateString(undefined,{weekday:'short'});
      const hi = Math.round(d.daily.temperature_2m_max[i]);
      const lo = Math.round(d.daily.temperature_2m_min[i]);
      fc.innerHTML += `<div class="day"><div class="d">${day}</div><div>${wIcon(d.daily.weather_code[i])}</div><div>${hi}°/${lo}°</div></div>`;
    }
    weatherShown = true;
  }
  // show last-known weather instantly (Pi often boots before it wins the portal session)
  try{ const c = JSON.parse(localStorage.getItem('weatherCache')); if(c) renderWeather(c); }catch(e){}
  async function weather(){
    try{
      const url = `https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}` +
        `&current=temperature_2m,weather_code&daily=weather_code,temperature_2m_max,temperature_2m_min` +
        `&forecast_days=4&timezone=auto&temperature_unit=${UNITS}`;
      const d = await (await fetch(url)).json();
      renderWeather(d);
      try{ localStorage.setItem('weatherCache', JSON.stringify(d)); }catch(e){}
      return true;
    }catch(e){
      if(!weatherShown) document.getElementById('weatherNow').textContent = 'Weather unavailable';
      return false;
    }
  }
  async function weatherLoop(){ const ok = await weather(); setTimeout(weatherLoop, ok ? 15*60*1000 : 30*1000); }
  weatherLoop();
  document.getElementById('weatherCard').addEventListener('click',()=>{
    document.getElementById('forecast').classList.toggle('open');
  });

  function barColor(v){ return v>85 ? '#ff5d5d' : v>60 ? '#ffb454' : '#5b8cff'; }
  async function loadStats(){
    try{
      const s = await (await fetch('/stats')).json();
      const txt=(id,v)=>{const e=document.getElementById(id); if(e) e.textContent=v;};
      const bar=(id,v)=>{const e=document.getElementById(id); if(e){ e.style.width=(v||0)+'%'; e.style.background=barColor(v||0);} };
      txt('cpuPct',  s.cpu_pct!=null  ? s.cpu_pct+'%'   : '—');
      txt('cpuTemp', s.cpu_temp!=null ? s.cpu_temp+'°C' : '—');
      txt('memPct',  s.mem.pct!=null  ? s.mem.pct+'% ('+s.mem.used+'/'+s.mem.total+' GB)' : '—');
      txt('diskPct', s.disk.pct!=null ? s.disk.pct+'% ('+s.disk.used+'/'+s.disk.total+' GB)' : '—');
      txt('fanRpm',  s.fan_rpm!=null  ? s.fan_rpm : '—');
      bar('cpuBar',  s.cpu_pct); bar('memBar', s.mem.pct); bar('diskBar', s.disk.pct);
    }catch(e){}
  }
  loadStats(); setInterval(loadStats,3000);

  // ---- AI daily brief ----
  async function loadDigest(){
    try{
      const d = await (await fetch('/digest')).json();
      if(!d.bullets || !d.bullets.length) return false;
      const ul = document.getElementById('briefList'); ul.innerHTML = '';
      d.bullets.forEach(b=>{ const li = document.createElement('li'); li.textContent = b; ul.appendChild(li); });
      document.getElementById('briefTime').textContent =
        '· ' + new Date(d.generated*1000).toLocaleString([], {weekday:'short', hour:'numeric', minute:'2-digit'});
      return true;
    }catch(e){ return false; }
  }
  async function digestLoop(){ const ok = await loadDigest(); setTimeout(digestLoop, ok ? 30*60*1000 : 30*1000); }
  digestLoop();

  // ---- speed test history ----
  let speedHist = [];
  function drawSpeed(){
    const cv = document.getElementById('speedChart');
    const ctx = cv.getContext('2d');
    const W = cv.width, H = cv.height;
    ctx.clearRect(0,0,W,H);
    if(speedHist.length < 2){
      ctx.fillStyle = 'rgba(255,255,255,0.6)';
      ctx.font = '11px sans-serif';
      ctx.fillText('Collecting data — check back later', 8, H/2);
      return;
    }
    const mx = Math.max(...speedHist.map(r=>Math.max(r.down,r.up)), 1);
    function plot(key, color){
      ctx.strokeStyle = color; ctx.lineWidth = 1.5; ctx.beginPath();
      speedHist.forEach((r,i)=>{
        const x = i*(W-4)/(speedHist.length-1)+2;
        const y = H-4-(r[key]/mx)*(H-8);
        i ? ctx.lineTo(x,y) : ctx.moveTo(x,y);
      });
      ctx.stroke();
    }
    plot('down','#5b8cff'); plot('up','#7ee0a3');
  }
  async function loadSpeed(){
    try{
      const d = await (await fetch('/speed')).json();
      speedHist = d.history || [];
      if(speedHist.length){
        const l = speedHist[speedHist.length-1];
        document.getElementById('netNow').textContent = '↓'+Math.round(l.down)+' ↑'+Math.round(l.up);
        document.getElementById('speedLatest').textContent =
          'Latest: ↓'+l.down+' ↑'+l.up+' Mbps · ping '+l.ping+' ms · '+new Date(l.ts*1000).toLocaleTimeString([], {hour:'numeric',minute:'2-digit'});
        drawSpeed();
      }
    }catch(e){}
  }
  loadSpeed(); setInterval(loadSpeed, 10*60*1000);
  document.getElementById('netRow').addEventListener('click', (ev)=>{
    ev.stopPropagation();
    document.getElementById('speedPop').classList.toggle('open');
    drawSpeed();
  });

  // ---- reminders ----
  const remList = document.getElementById('remList');
  async function remPost(body){
    const r = await fetch('/todos', {method:'POST',
      headers:{'Content-Type':'application/json'}, body: JSON.stringify(body)});
    return (await r.json()).todos;
  }
  function renderRem(ts){
    remList.innerHTML = '';
    if(!ts || !ts.length){
      remList.innerHTML = '<li style="opacity:.5;cursor:default">Nothing yet — add one below</li>';
      return;
    }
    ts.forEach(t=>{
      const li = document.createElement('li');
      if(t.done) li.classList.add('done');
      const txt = document.createElement('span'); txt.className = 'txt'; txt.textContent = t.text;
      const del = document.createElement('span'); del.className = 'del'; del.textContent = '✕';
      li.appendChild(txt); li.appendChild(del);
      li.addEventListener('click', async ()=>{ try{ renderRem(await remPost({action:'toggle', id:t.id})); }catch(e){} });
      del.addEventListener('click', async (ev)=>{ ev.stopPropagation(); try{ renderRem(await remPost({action:'delete', id:t.id})); }catch(e){} });
      remList.appendChild(li);
    });
  }
  async function remRefresh(){ try{ renderRem((await (await fetch('/todos')).json()).todos); }catch(e){} }
  document.getElementById('remForm').addEventListener('submit', async (ev)=>{
    ev.preventDefault();
    const inp = document.getElementById('remInput');
    const v = inp.value.trim();
    if(!v) return;
    inp.value = '';
    try{ renderRem(await remPost({action:'add', text:v})); }catch(e){}
  });
  remRefresh(); setInterval(remRefresh, 60000);

  // ---- power button (tap twice to confirm) ----
  const POWER = '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 2v9"/><path d="M18.4 6.6a9 9 0 1 1-12.8 0"/></svg>';
  const powerBtn = document.getElementById('powerBtn');
  document.getElementById('pwIcon').innerHTML = POWER;
  let pwArmed = false, pwTimer = null;
  powerBtn.addEventListener('click', async ()=>{
    if(!pwArmed){
      pwArmed = true;
      powerBtn.classList.add('confirm');
      document.getElementById('pwLabel').textContent = 'Sure?';
      pwTimer = setTimeout(()=>{
        pwArmed = false;
        powerBtn.classList.remove('confirm');
        document.getElementById('pwLabel').textContent = 'Off';
      }, 4000);
    } else {
      clearTimeout(pwTimer);
      document.getElementById('pwLabel').textContent = 'Bye!';
      try{ await fetch('/power?do=off'); }catch(e){}
    }
  });

  // brightness toggle (SVG icons + animation)
  const MOON = '<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8z"/></svg>';
  const SUN  = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>';
  const dimBtn = document.getElementById('dimBtn');
  let dimmed = false;
  function updateDimBtn(){
    document.getElementById('dimIcon').innerHTML = dimmed ? SUN : MOON;
    document.getElementById('dimLabel').textContent = dimmed ? 'Brighten' : 'Dim';
    dimBtn.classList.toggle('on', dimmed);
  }
  function animateDim(){ dimBtn.classList.remove('spin'); void dimBtn.offsetWidth; dimBtn.classList.add('spin'); }
  dimBtn.addEventListener('click', async ()=>{
    dimmed = !dimmed;
    updateDimBtn(); animateDim();
    try{ await fetch('/backlight?set=' + (dimmed?15:100)); }catch(e){}
  });
  updateDimBtn();
  async function refreshDim(){
    try{ const r = await (await fetch('/backlight')).json(); if(r.pct!=null){ dimmed = r.pct <= 40; updateDimBtn(); } }catch(e){}
  }
  refreshDim(); setInterval(refreshDim,30000);
</script>
</body>
</html>
